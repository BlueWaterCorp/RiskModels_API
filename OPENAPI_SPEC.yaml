    MCPTool:
      type: object
      description: >
        MCP tool descriptor as returned by `tools/list`. Tools are discoverable via
        `https://riskmodels.app/.well-known/mcp.json` or by connecting to the SSE
        endpoint at `https://riskmodels.app/api/mcp/sse` and calling `tools/list`.
      properties:
        name:
          type: string
          enum:
            - riskmodels_list_endpoints
            - riskmodels_get_capability
            - riskmodels_get_schema
            - analyze_portfolio
            - hedge_portfolio
            - get_risk_decomposition
          description: |
            Available tools:
            - `riskmodels_list_endpoints`: List all available API endpoints with summaries, tags, and costs. No required inputs.
            - `riskmodels_get_capability`: Get detailed schema and documentation for a specific capability by ID (e.g. "ticker-returns", "metrics", "l3-decomposition"). Input: `{ id: string }`.
            - `riskmodels_get_schema`: Fetch the JSON response schema for a given endpoint path. Input: `{ path: string }`.
            - `analyze_portfolio`: Analyze a portfolio of ticker positions — returns per-ticker risk metrics (volatility, hedge ratios, explained risk) and portfolio-level aggregates. Input: `{ positions: Array<{ ticker: string, weight?: number }> }`.
            - `hedge_portfolio`: Compute optimal hedge notionals for a portfolio using ERM3 factor model. Returns L1/L2/L3 hedge amounts in USD. Input: `{ positions: Array<{ ticker: string, notional_usd: number }>, level?: "l1"|"l2"|"l3" }`.
            - `get_risk_decomposition`: Get monthly L3 factor risk decomposition time series for a ticker. Input: `{ ticker: string, from?: string, to?: string }`.
        description:
          type: string
        inputSchema:
          type: object
          description: JSON Schema describing the tool's input parameters.
        outputSchema:
          type: object
          description: JSON Schema describing the tool's output structure.

    RankingMetricKeys:
      type: object
      description: >
        V3 security_history ranking metric keys (when rankings are exposed via API).
        Pattern: rank_ord_{window}_{cohort}_{metric}, cohort_size_{window}_{cohort}_{metric}.
        Windows: 1d, 21d, 63d, 252d. Cohorts: universe, sector, subsector.
        Metrics: mkt_cap, gross_return, sector_residual, subsector_residual, er_l1, er_l2, er_l3.
        rank_percentile computed client-side: (1 - (rank_ord - 1) / cohort_size) * 100.

