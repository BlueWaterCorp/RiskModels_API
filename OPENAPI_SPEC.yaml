            - $ref: "#/components/schemas/FactorCorrelationResultBody"
            - type: object
              properties:
                _metadata:
                  $ref: "#/components/schemas/RiskMetadata"
                _agent:
                  type: object
                  properties:
                    latency_ms:
                      type: integer
                    request_id:
                      type: string
        - type: object
          required:
            - results
          properties:
            results:
              type: array
              items:
                oneOf:
                  - $ref: "#/components/schemas/FactorCorrelationResultBody"
                  - type: object
                    required:
                      - ticker
                      - error
                      - status
                    properties:
                      ticker:
                        type: string
                      error:
                        type: string
                      status:
                        type: integer
            _metadata:
              $ref: "#/components/schemas/RiskMetadata"
            _agent:
              type: object
              properties:
                latency_ms:
                  type: integer
                request_id:
                  type: string

    FactorCorrelationResultBody:
      type: object
      required:
