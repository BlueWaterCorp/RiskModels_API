    RateLimitExceeded:
      type: object
      description: Returned when the per-minute rate limit is exceeded (HTTP 429).
      properties:
        error:
          type: string
          enum: [RATE_LIMIT_EXCEEDED]
          example: RATE_LIMIT_EXCEEDED
        message:
          type: string
          example: "Rate limit exceeded. Retry after 2026-03-08T12:34:56Z"
        retry_after:
          type: string
          format: date-time
          description: ISO timestamp after which the client may retry.
          example: "2026-03-08T12:34:56Z"
        limit:
          type: integer
          description: Requests allowed per minute for this key.
          example: 60

    Fund:
      type: object
      description: >
        Mutual fund registry row from `public.funds`. One row per `bw_fund_id`.
        Latest temporal triple (`latest_report_date` / `latest_filing_date` /
        `latest_extracted_at`) reflects the most recent N-PORT snapshot known
        for this fund. Q5 lock: `primary_bw_fund_id` is reserved as a nullable
        column; NULL means this row IS the primary share class (or no primary
        chosen yet). See ARCHITECTURE_FUNDS_API.md §4.1.
      properties:
        bw_fund_id:
          type: string
          description: Funds_DAG canonical fund id. Format `BW-FUND-{series_id}`.
          example: BW-FUND-S000004310
        series_id:
          type: string
          nullable: true
          description: SEC series id.
          example: S000004310
        ticker:
          type: string
          nullable: true
          example: VFINX
        cik:
          type: string
          nullable: true
        fund_name:
          type: string
          nullable: true
          example: Vanguard 500 Index Fund Investor Shares
        morningstar_category:
          type: string
          nullable: true
        equity_style_9box:
          type: string
          nullable: true
          enum:
            - Large Value
            - Large Blend
            - Large Growth
            - Mid Value
            - Mid Blend
            - Mid Growth
            - Small Value
            - Small Blend
            - Small Growth
        style_link_method:
          type: string
          nullable: true
        primary_bw_fund_id:
          type: string
          nullable: true
        latest_report_date:
          type: string
          format: date
          nullable: true
          description: Period end of the most recent reported holdings (= "fund_date").
        latest_filing_date:
          type: string
          format: date
          nullable: true
          description: SEC acceptance date for the latest filing (= "release_date").
        latest_extracted_at:
          type: string
          format: date-time
          nullable: true
        latest_total_adj_mv:
          type: number
          format: float
          nullable: true
        latest_n_holdings:
          type: integer
          nullable: true
        latest_effective_n:
          type: number
          format: float
          nullable: true
        last_in_eligible_universe_at:
          type: string
          format: date
          nullable: true
        metadata:
          type: object
          additionalProperties: true
          nullable: true

    FundLatest:
      type: object
      description: >
        Wide-row latest knowledge-mode snapshot from `public.funds_latest`.
        One row per `bw_fund_id`. Returns and diagnostics flatten the per-fund
        `ds_portfolio.zarr` (Funds_DAG Slice 8). Multi-quarter history lives
        in GCS Zarr (Stage B+). See ARCHITECTURE_FUNDS_API.md §4.2.
      required: [bw_fund_id, report_date, filing_date, extracted_at, last_synced_at]
      properties:
        bw_fund_id: { type: string, example: BW-FUND-S000004310 }
        report_date: { type: string, format: date, example: "2026-04-30" }
        filing_date: { type: string, format: date, example: "2026-07-14" }
        extracted_at: { type: string, format: date-time }
        portfolio_gross_return: { type: number, format: float, nullable: true }
        portfolio_market_return: { type: number, format: float, nullable: true }
        portfolio_sector_return: { type: number, format: float, nullable: true }
        portfolio_subsector_return: { type: number, format: float, nullable: true }
        portfolio_idiosyncratic_return: { type: number, format: float, nullable: true }
        identity_residual: { type: number, format: float, nullable: true }
        weight_sum:
          type: number
          format: float
          nullable: true
          description: ERM3 universe coverage (fraction of fund AUM mapping to in-universe symbols).
        n_holdings_active: { type: integer, nullable: true }
        effective_n:
          type: number
          format: float
          nullable: true
          description: HHI-derived diversification (1 / sum(w_i^2)).
        top10_weight_sum: { type: number, format: float, nullable: true }
        total_adj_mv: { type: number, format: float, nullable: true }
        equity_style_9box: { type: string, nullable: true }
        n_funds_in_cell_at_report_date: { type: integer, nullable: true }
        model_version:
          type: string
          nullable: true
          example: funds_dag.v20260502
        factor_set_id:
          type: string
          nullable: true
          example: uni_mc_3000_SPY
        last_synced_at: { type: string, format: date-time }
        metadata:
          type: object
          additionalProperties: true
          nullable: true

    FundWithLatest:
      type: object
      description: Fund registry row joined with the latest knowledge-mode snapshot.
      required: [fund]
      properties:
        fund:
          $ref: "#/components/schemas/Fund"
        latest:
          oneOf:
            - $ref: "#/components/schemas/FundLatest"
            - type: "null"
          nullable: true

    FundsBatchRequest:
      type: object
      required: [fund_ids]
      properties:
        fund_ids:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 1000
          example: ["BW-FUND-S000004310", "BW-FUND-S000123456"]

    FundsBatchResponse:
      type: object
      description: Multi-fund lookup. Keys are `bw_fund_id`s present in the registry.
      properties:
        results:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/FundWithLatest"

    FundsSearchResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/Fund"

    FundsStyleMembersResponse:
      type: object
      required: [equity_style_9box, slug, fund_ids, count]
      properties:
        equity_style_9box:
          type: string
          example: Large Blend
        slug:
          type: string
          example: large-blend
        fund_ids:
          type: array
          items:
            type: string
        count:
          type: integer

    FundMetricsResponse:
      type: object
      description: >
        Latest knowledge-mode metrics for a single mutual fund. Joins
        `public.funds` (registry) with `public.funds_latest` (the wide-row
        snapshot) and groups return components / diagnostics / meta into
        nested objects. Bitemporal triple is at the top level; lineage in
        `_metadata`.
      required: [bw_fund_id, report_date, filing_date, extracted_at, returns, diagnostics, meta, _metadata]
      properties:
        bw_fund_id: { type: string, example: BW-FUND-S000004310 }
        ticker: { type: string, nullable: true, example: VFINX }
        fund_name: { type: string, nullable: true }
        equity_style_9box:
          type: string
          nullable: true
          enum:
            - Large Value
            - Large Blend
            - Large Growth
            - Mid Value
            - Mid Blend
            - Mid Growth
            - Small Value
            - Small Blend
            - Small Growth
        report_date: { type: string, format: date, example: "2026-04-30" }
        filing_date: { type: string, format: date, example: "2026-07-14" }
        extracted_at: { type: string, format: date-time }
        returns:
          type: object
          description: Portfolio-level return components from the per-fund Slice 8 zarr.
          properties:
            gross: { type: number, format: float, nullable: true }
            market: { type: number, format: float, nullable: true }
            sector: { type: number, format: float, nullable: true }
            subsector: { type: number, format: float, nullable: true }
            idiosyncratic: { type: number, format: float, nullable: true }
            identity_residual:
              type: number
              format: float
              nullable: true
              description: L3 noise diagnostic (gross − sum of layer returns).
        diagnostics:
          type: object
          properties:
            weight_sum:
              type: number
              format: float
              nullable: true
              description: ERM3 universe coverage (fraction of fund AUM in mapped symbols).
            n_holdings_active: { type: integer, nullable: true }
            effective_n:
              type: number
              format: float
              nullable: true
              description: HHI-derived diversification (1 / sum(w_i^2)).
            top10_weight_sum: { type: number, format: float, nullable: true }
        meta:
          type: object
          properties:
            total_adj_mv: { type: number, format: float, nullable: true }
            n_funds_in_cell_at_report_date: { type: integer, nullable: true }
            morningstar_category: { type: string, nullable: true }
            primary_bw_fund_id: { type: string, nullable: true }
        _metadata:
          type: object
          properties:
            model_version:
              type: string
              nullable: true
              example: funds_dag.v20260502
            factor_set_id:
              type: string
              nullable: true
              example: uni_mc_3000_SPY
            data_as_of: { type: string, format: date }
            data_freshness: { type: string, format: date-time }
            last_synced_at: { type: string, format: date-time }

security:
  - BearerAuth: []

paths:
  /auth/token:
    post:
      summary: Generate OAuth2 Access Token
      description: >
        OAuth 2.0 client credentials flow for machine-to-machine authentication.
        Exchange API credentials for a short-lived JWT token (15 minutes).


        **Use Cases:**

        - AI agents connecting to the API

        - Server-to-server integrations

        - npm package authentication

        - MCP client authentication
      operationId: generateOAuthToken
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OAuth2TokenRequest"
            example:
              grant_type: client_credentials
              client_id: rm_agent_live_abc123
              client_secret: rm_agent_live_abc123_xyz789_checksum
              scope: ticker-returns risk-decomposition
      responses:
        "200":
          description: Access token generated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuth2TokenResponse"
              example:
                access_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                token_type: Bearer
                expires_in: 900
                scope: ticker-returns risk-decomposition batch-analysis
        "400":
          description: Invalid request (missing or invalid grant_type)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuth2Error"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuth2Error"

  /mcp/sse:
    get:
      summary: MCP Streamable HTTP Connection
      description: >
        Model Context Protocol endpoint using the Streamable HTTP transport
        (successor to the legacy SSE+companion-POST pattern). A single URL
        handles both `GET` (optional server→client event stream) and `POST`
        (client→server JSON-RPC 2.0 messages).


        **Discovery:** The MCP server manifest is published at
        `https://riskmodels.app/.well-known/mcp.json` for automated client discovery.


        **Connection:**

        - Transport: Streamable HTTP (stateless mode)

        - Authentication: `Authorization: Bearer <key>` (preferred) or
          `?api_key=<key>` query param (for `EventSource`, which can't set
          custom headers).

        - Tool-call billing: charged per-invocation on the underlying REST
          endpoint (e.g. `get_metrics` bills the same as `GET /metrics/{ticker}`).


        **Usage — mcp-remote proxy:**

        ```json

        {
          "mcpServers": {
            "riskmodels": {
              "command": "npx",
              "args": ["mcp-remote", "https://riskmodels.app/api/mcp/sse"],
              "env": { "AUTHORIZATION": "Bearer rm_agent_live_..." }
            }
          }
        }

        ```
      operationId: mcpServerSSE
      tags:
        - MCP
      security:
        - BearerAuth: []
        - OAuth2ClientCredentials: ["*"]
      responses:
        "200":
          description: SSE connection established
          content:
            text/event-stream:
              schema:
                type: string
                format: event-stream
              example: |
                data: {"jsonrpc":"2.0","method":"notifications/initialized","params":{...}}

                data: {"jsonrpc":"2.0","method":"notifications/ping","params":{"timestamp":1234567890}}
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Insufficient balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsufficientBalance"
        "429":
          description: Rate limit exceeded.
          headers:
            Retry-After:
              schema: { type: integer }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitExceeded"

    post:
      summary: MCP JSON-RPC Request
      description: >
        Send JSON-RPC 2.0 messages to the MCP server.


        **Available methods:**

        - `tools/list` - List available MCP tools

        - `tools/call` - Invoke an MCP tool

        - `resources/list` - List available resources

        - `resources/read` - Read a resource
      operationId: mcpServerRPC
      tags:
        - MCP
      security:
        - BearerAuth: []
        - OAuth2ClientCredentials: ["*"]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - jsonrpc
                - method
                - id
              properties:
                jsonrpc:
                  type: string
                  enum: ["2.0"]
                method:
                  type: string
                  example: tools/call
                params:
                  type: object
                id:
                  oneOf:
                    - type: string
                    - type: integer
            example:
              jsonrpc: "2.0"
              method: tools/call
              params:
                name: riskmodels_get_capability
                arguments:
                  id: ticker-returns
              id: 1
      responses:
        "200":
          description: JSON-RPC response
          content:
            application/json:
              schema:
                type: object
                properties:
                  jsonrpc:
                    type: string
                    enum: ["2.0"]
                  result:
                    type: object
                  error:
                    type: object
                    properties:
                      code:
                        type: integer
                      message:
                        type: string
                  id:
                    oneOf:
                      - type: string
                      - type: integer
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Insufficient balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsufficientBalance"
        "429":
          description: Rate limit exceeded.
          headers:
            Retry-After:
              schema: { type: integer }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitExceeded"

  /.well-known/ai-plugin.json:
    get:
      summary: OpenAI GPT Plugin Manifest
      description: >
        Plugin manifest for OpenAI GPT Store integration.
        Enables ChatGPT and other OpenAI models to discover and use the RiskModels API.
      operationId: getAIPluginManifest
      tags:
        - Compliance
        - Discovery
      security: []
      responses:
        "200":
          description: Plugin manifest
          content:
            application/json:
              schema:
                type: object
                properties:
                  schema_version:
                    type: string
                    example: v1
                  name_for_human:
                    type: string
                    example: RiskModels
                  name_for_model:
                    type: string
                    example: riskmodels
                  description_for_human:
                    type: string
                  description_for_model:
                    type: string
                  auth:
                    type: object
                    properties:
                      type:
                        type: string
                        enum: [service_http]
                      authorization_type:
                        type: string
                        enum: [bearer]
                  api:
                    type: object
                    properties:
                      type:
                        type: string
                        enum: [openapi]
                      url:
                        type: string
                        format: uri
                  logo_url:
                    type: string
                    format: uri
                  contact_email:
                    type: string
                    format: email

  /.well-known/agentic-disclosure.json:
    get:
      summary: Agentic Privacy Disclosure
      description: >
        Comprehensive data handling and privacy disclosure for AI marketplace compliance.
        Documents encryption, retention, third-party sharing, and regulatory compliance.


        **Key sections:**

        - Data handling (AES-256-GCM, GCP KMS)

        - Cryptographic shredding for GDPR compliance

        - Third-party sharing policy (none)

        - AI model usage (no training on user data)

        - Compliance (GDPR, SOC2, PCI-DSS)
      operationId: getAgenticDisclosure
      tags:
        - Compliance
        - Privacy
      security: []
      responses:
        "200":
          description: Privacy disclosure document
          content:
            application/json:
              schema:
                type: object
                properties:
                  service:
                    type: object
                  data_handling:
                    type: object
                  compliance:
                    type: object
                  security:
                    type: object
                  transparency:
                    type: object

  /.well-known/mcp.json:
    get:
      summary: MCP Server Manifest
      description: >
        Model Context Protocol server connection manifest.
        Enables AI model clients to discover and connect to the RiskModels MCP server.
      operationId: getMCPManifest
      tags:
        - MCP
        - Discovery
      security: []
      responses:
        "200":
          description: MCP server manifest
          content:
            application/json:
              schema:
                type: object
                properties:
                  mcpServers:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        name:
                          type: string
                        description:
                          type: string
                        url:
                          type: string
                          format: uri
                        transport:
                          type: string
                          enum: [sse, stdio]
                        auth:
                          type: object
                        capabilities:
                          type: object
                        tools:
                          type: array
                          items:
                            $ref: "#/components/schemas/MCPTool"

  /plaid/link-token:
    post:
      summary: Create Plaid Link token (Investments)
      description: >
        One-time `link_token` for Plaid Link in the browser. Requires an authenticated user.
        After Link succeeds, exchange the `public_token` via `POST /plaid/exchange-public-token`.
        **No per-request charge.**
      operationId: createPlaidLinkToken
      tags: [Plaid Integration]
      x-pricing:
        capability_id: plaid-link-token
        tier: baseline
        model: per_request
        cost_usd: 0
        currency: USD
        billing_code: plaid_link_token_v1
      security:
        - BearerAuth: []
        - OAuth2ClientCredentials: [plaid:holdings]
      responses:
        "200":
          description: Link token for Plaid Link SDK.
          content:
            application/json:
              schema:
                type: object
                properties:
                  link_token:
                    type: string
                  expiration:
                    type: string
                    description: RFC-3339 datetime when the link_token expires.
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Plaid or configuration error.

  /plaid/exchange-public-token:
    post:
      summary: Exchange Plaid public token for stored item
      description: >
        Exchanges the short-lived `public_token` from Plaid Link for an access token, encrypted
        and stored server-side. Repeat connections create/update one row per Plaid `item_id`.
        **No per-request charge.**
      operationId: exchangePlaidPublicToken
      tags: [Plaid Integration]
      x-pricing:
        capability_id: plaid-exchange-public-token
        tier: baseline
        model: per_request
        cost_usd: 0
        currency: USD
        billing_code: plaid_exchange_v1
      security:
        - BearerAuth: []
        - OAuth2ClientCredentials: [plaid:holdings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [public_token]
              properties:
                public_token:
                  type: string
                  description: From Plaid Link onSuccess.
      responses:
        "200":
          description: Item stored.
          content:
            application/json:
              schema:
                type: object
                properties:
                  item_id:
                    type: string
                  request_id:
                    type: string
        "400":
          description: Missing or invalid body.
        "401":
          description: Unauthorized.
        "500":
          description: Plaid or storage error.

  /plaid/holdings:
    get:
      summary: Fetch Plaid-synced portfolio holdings
      description: >
        Returns enriched holdings from connected Plaid accounts with risk metrics.


        **Features:**

        - Automatic ticker resolution and normalization

        - Risk enrichment with factor exposures

        - Real-time portfolio valuation

        - Multi-account aggregation


        **Authentication:** Required (API Key or OAuth2 with plaid:holdings scope)

        **Billing:** $0.02 per request

        **Rate Limit:** 60 requests/minute
      operationId: getPlaidHoldings
      tags:
        - Plaid Integration
      x-pricing:
        capability_id: plaid-holdings
        tier: premium
        model: per_request
        cost_usd: 0.02
        currency: USD
        billing_code: plaid_holdings_v2
      security:
        - BearerAuth: []
        - OAuth2ClientCredentials: [plaid:holdings]
      responses:
        "200":
          description: Enriched holdings with risk metrics
          headers:
            X-API-Cost-USD:
              schema: { type: string }
            X-RateLimit-Limit:
              schema: { type: integer }
            X-RateLimit-Remaining:
              schema: { type: integer }
            X-RateLimit-Reset:
              schema: { type: integer }
          content:
            application/json:
              schema:
                type: object
                properties:
                  holdings:
                    type: array
                    items:
                      $ref: "#/components/schemas/PlaidHolding"
                  accounts:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                    description: Plaid account objects from Investments Holdings (per connected item).
                  securities:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                    description: Plaid security objects referenced by holdings.
                  connections_count:
                    type: integer
                    description: Number of connected Plaid items for this user.
                  summary:
                    type: object
                    properties:
                      total_value:
                        type: number
                      account_count:
                        type: integer
                      position_count:
                        type: integer
                  _metadata:
                    type: object
                    additionalProperties: true
                  _agent:
                    $ref: "#/components/schemas/AgentMeta"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: API key missing `plaid:holdings` scope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Insufficient balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsufficientBalance"
        "429":
          description: Rate limit exceeded.
          headers:
            Retry-After:
              schema: { type: integer }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitExceeded"
        "503":
          description: Plaid or token encryption not configured.

  /metrics/{ticker}:
    get:
      summary: Latest risk metrics snapshot
      description: >
        Returns the latest V3 daily metrics for the ticker. Numeric fields are under the
        `metrics` object using abbreviated keys (`l3_mkt_hr`, `l3_sec_hr`, `l3_sub_hr`,
        `l3_mkt_er`, `l3_res_er`, `vol_23d`, etc.). The observation date is `teo`.
        Optional `display` maps keys to human-readable labels.


        **Authentication:** Required (API Key or OAuth2)

        **Billing:** $0.001 per request (deducted from account balance)

        **Rate Limit:** 60 requests/minute (default)
      operationId: getMetrics
      tags: [Risk Metrics]
      x-pricing:
        capability_id: metrics
        tier: baseline
        model: per_request
        cost_usd: 0.001
        currency: USD
        billing_code: metrics_v3
      security:
        - BearerAuth: []
        - OAuth2ClientCredentials: [ticker-returns]
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
          description: Ticker symbol (case-insensitive).
          example: NVDA
      responses:
        "200":
          description: Latest metrics snapshot.
          headers:
            X-API-Cost-USD:
              schema: { type: string }
              description: Cost deducted for this request (e.g. "0.001").
            X-Cache-Status:
              schema: { type: string, enum: [HIT, MISS, BYPASS] }
            X-Data-Freshness:
              schema: { type: string, format: date-time }
            X-RateLimit-Limit:
              schema: { type: integer }
              description: Request limit per minute
            X-RateLimit-Remaining:
              schema: { type: integer }
              description: Remaining requests in current window
            X-RateLimit-Reset:
              schema: { type: integer }
              description: Unix timestamp when limit resets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricsSnapshotResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Insufficient balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsufficientBalance"
        "404":
          description: Symbol not found or no metrics row (see error message).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded.
          headers:
            Retry-After:
              schema: { type: integer }
              description: Seconds to wait before retrying
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitExceeded"

  /decompose:
    post:
      summary: Decompose a position into four additive bets with hedge ratios
      description: >
        Returns the simplified four-layer ERM3 exposure for a single ticker:
        `market`, `sector`, `subsector`, and `residual`. Each tradable layer
        (market / sector / subsector) maps to a hedge ETF from `ticker_metadata`;
        `residual` is stock-specific and not tradable. The response also includes
        a top-level `hedge` map of ETF → dollar ratio (negative of the layer
        hedge ratio by convention, so a positive stock HR yields a negative ETF
        notional: short the ETF to offset long stock exposure).


        Same billing profile as `GET /metrics/{ticker}` — this is a thin
        semantic wrapper that flattens the L3 metrics into an agent-friendly
        shape. For the full L1/L2/L3 snapshot (all six HR names), use
        `GET /metrics/{ticker}`.


        **Authentication:** Required (API Key or OAuth2)

        **Billing:** $0.001 per request

        **Rate Limit:** 120 requests/minute (default)
      operationId: decomposePosition
      tags: [Risk Metrics]
      x-pricing:
        capability_id: decompose-position
        tier: baseline
        model: per_request
        cost_usd: 0.001
        currency: USD
        billing_code: metrics_v3
      security:
        - BearerAuth: []
        - OAuth2ClientCredentials: [ticker-returns]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DecomposeRequest"
            examples:
              nvda:
                summary: Decompose NVDA
                value: { ticker: "NVDA" }
              aapl:
                summary: Decompose AAPL
                value: { ticker: "AAPL" }
      responses:
        "200":
          description: Four-layer decomposition with hedge map.
          headers:
            X-API-Cost-USD:
              schema: { type: string }
              description: Cost deducted for this request (e.g. "0.001").
            X-Data-Freshness:
              schema: { type: string, format: date-time }
            X-RateLimit-Limit:
              schema: { type: integer }
            X-RateLimit-Remaining:
              schema: { type: integer }
            X-RateLimit-Reset:
              schema: { type: integer }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DecomposeResponse"
        "400":
          description: Malformed ticker or invalid JSON body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Insufficient balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsufficientBalance"
        "404":
          description: Symbol not found or no metrics row.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded.
          headers:
            Retry-After:
              schema: { type: integer }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitExceeded"

  /ticker-returns:
    get:
      summary: Daily returns time series with rolling hedge ratios (stocks and ETFs)
      description: >
        Returns a daily time series of gross returns (`returns_gross`) and, for stocks, V3 rolling
        hedge ratios and explained-risk fields per day: `l3_mkt_hr`, `l3_sec_hr`, `l3_sub_hr`,
        `l3_mkt_er`, `l3_sec_er`, `l3_sub_er`, `l3_res_er`. Up to 15 years per request.
        **ETFs are supported**: requests for ETF tickers (e.g. `SPY`, `XLK`) return
        `date`, `returns_gross`, and `price_close` sourced from `ds_etf.zarr`; L1/L2/L3 columns
        are `null` because ETFs are not factor-decomposed. The response includes
        `asset_type` ("stock" or "etf") so clients can branch cleanly.
        For the full L1/L2/L3 **snapshot** (all six HR names on the latest day), use
        `GET /metrics/{ticker}` (`metrics` object). Response does not include a top-level `_agent`
        block; billing is applied server-side. Cost: $0.005/call regardless of years pulled.
      operationId: getTickerReturns
      tags: [Risk Metrics]
      x-pricing:
        capability_id: ticker-returns
        tier: baseline
        model: per_request
        cost_usd: 0.005
        currency: USD
        billing_code: ticker_returns_v2
      parameters:
        - name: ticker
          in: query
          required: true
          schema:
            type: string
          example: NVDA
        - name: years
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 15
            default: 1
          description: Number of years of history to return.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
          description: Maximum number of rows to return.
        - name: nocache
          in: query
          required: false
          schema:
            type: boolean
          description: Bypass cache (incurs cost even if identical request was recently made).
        - $ref: "#/components/parameters/FormatQueryTabular"
      responses:
        "200":
          description: >
            Time series of daily returns, `price_close`, and V3 rolling HR/ER fields. JSON wraps rows
            in `data` with `symbol`, `ticker`, `meta`, `_metadata`. Parquet/CSV are a single table:
            one row per trading day; columns match `#/components/schemas/TickerReturnsDailyRow` in a
            stable key order (same field names as JSON object keys in each `data` element).
          headers:
            ETag:
              schema:
                type: string
              description: >
                Weak ETag (`W/"..."`). Clients may send `If-None-Match` to obtain `304 Not Modified`
                when the series is unchanged for this ticker, `years`, and format.
            X-Risk-Model-Version:
              schema: { type: string }
            X-Data-As-Of:
              schema: { type: string, format: date }
            X-Factor-Set-Id:
              schema: { type: string }
            X-Universe-Size:
              schema: { type: integer }
          content:
            application/vnd.apache.parquet:
              schema:
                type: string
                format: binary
              description: >
                Apache Parquet (one table). Row schema equals `#/components/schemas/TickerReturnsDailyRow`.
                No `_metadata` columns; use response headers for lineage.
            text/csv:
              schema:
                type: string
              description: >
                UTF-8 CSV: header row then one row per trading day; columns match the Parquet export.
              example: |
                date,returns_gross,price_close,l3_mkt_hr,l3_sec_hr,l3_sub_hr,l3_mkt_er,l3_sec_er,l3_sub_er,l3_res_er
                2025-03-20,0.0123,950.25,0.95,0.12,0.03,0.41,0.22,0.08,0.29
            application/json:
              schema:
                $ref: "#/components/schemas/TickerReturnsResponseV3"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Insufficient balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsufficientBalance"
        "404":
          description: Ticker not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded.
          headers:
            Retry-After:
              schema: { type: integer }
              description: Seconds to wait before retrying.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitExceeded"

