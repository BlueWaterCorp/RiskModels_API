  /webhooks/subscribe:
    get:
      summary: List webhook subscriptions
      description: Returns active webhook subscriptions for the authenticated user (secrets omitted).
      operationId: listWebhookSubscriptions
      tags: [Webhooks]
      responses:
        "200":
          description: Subscription list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  subscriptions:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, format: uuid }
                        url: { type: string, format: uri }
                        events:
                          type: array
                          items: { type: string, enum: [batch.completed] }
                        active: { type: boolean }
                        created_at: { type: string, format: date-time }
                        updated_at: { type: string, format: date-time }
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error.
    post:
      summary: Create webhook subscription
      description: >
        Register an HTTPS URL for outbound events (e.g. `batch.completed`). The `secret` is returned
        once in the response; store it to verify `X-RiskModels-Signature` (HMAC-SHA256).
      operationId: createWebhookSubscription
      tags: [Webhooks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url, events]
              properties:
                url:
                  type: string
                  format: uri
                  maxLength: 2048
                  description: Must use https://
                events:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    enum: [batch.completed]
                active:
                  type: boolean
                  default: true
                secret:
                  type: string
                  minLength: 24
                  maxLength: 512
                  description: Optional custom secret; otherwise server-generated.
      responses:
        "201":
          description: Created; `secret` included in body for verification.
          content:
            application/json:
              schema:
                type: object
                properties:
                  subscription:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      url: { type: string, format: uri }
                      events:
                        type: array
                        items: { type: string }
                      active: { type: boolean }
                      created_at: { type: string, format: date-time }
                      secret: { type: string }
        "400":
          description: Invalid URL or body.
        "401":
          description: Unauthorized.
        "500":
          description: Server error.
    delete:
      summary: Delete webhook subscription
      description: Remove a subscription by id (`?id=` query parameter).
      operationId: deleteWebhookSubscription
      tags: [Webhooks]
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
        "400":
          description: Missing id.
        "401":
          description: Unauthorized.
        "404":
          description: Subscription not found.

  /tickers:
    get:
      summary: Ticker universe search
      description: >
        List tickers in the universe or search by name/symbol. Billed per request ($0.001).
        Use the `mag7` flag to retrieve the MAG7 tickers. Use `include_metadata` for
        sector and ETF assignment per ticker.
      operationId: getTickers
      tags: [Utility]
      x-pricing:
        capability_id: ticker-search
        tier: baseline
        model: per_request
        cost_usd: 0.001
        currency: USD
        billing_code: ticker_search_v2
      security: []
      parameters:
        - name: array
          in: query
          required: false
          schema:
            type: string
            enum: [ticker, teo]
          description: "`ticker` returns all ticker symbols. `teo` returns valid trading dates."
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Search string matched against ticker symbol or company name.
          example: NVDA
        - name: mag7
          in: query
          required: false
          schema:
            type: boolean
          description: Return only MAG7 tickers (AAPL, MSFT, NVDA, GOOGL, AMZN, META, TSLA).
        - name: include_metadata
          in: query
          required: false
          schema:
            type: boolean
          description: Include sector, sector ETF, and subsector ETF per ticker.
      responses:
        "200":
          description: Ticker list or search results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  tickers:
                    type: array
                    items:
                      type: string
                    example: ["AAPL", "MSFT", "NVDA"]
                  metadata:
                    type: object
                    nullable: true
                    additionalProperties:
                      type: object
                      properties:
                        name:
                          type: string
                        sector:
                          type: string
                        sector_etf:
                          type: string
                        subsector_etf:
                          type: string

  /estimate:
    post:
      summary: Estimate request cost
      description: >
        Returns predicted cost before a request is made. Free to call, requires authentication.
        Used by AI agents for pre-flight cost checks.
      operationId: estimateCost
      tags:
        - Billing
      x-pricing:
        metered: false
        cost_usd: 0
        note: Pre-flight cost estimate; not deducted from balance.
      security:
        - BearerAuth: []
        - OAuth2ClientCredentials: ["*"]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [endpoint]
              properties:
                endpoint:
                  type: string
                  example: "ticker-returns"
                  description: Target endpoint (ticker-returns, batch-analyze, l3-decomposition, etc.)
                params:
                  type: object
                  description: Same params as the target endpoint
                  example: { ticker: "AAPL", years: 5 }
      responses:
        "200":
          description: Cost estimate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstimateResponse"
        "400":
          description: Unknown endpoint or invalid request
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded.
          headers:
            Retry-After:
              schema: { type: integer }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitExceeded"

  /health:
    get:
      summary: Service health check
      description: >
        Returns current service status, version, capability availability (from recent billing_events),
        latest-session gross-return coverage (completeness signal), and optional macro_factors
        freshness for macro factor APIs (see macro_factors in the response). Free, no auth required.
      operationId: getHealth
      tags: [Utility]
      x-pricing:
        capability_id: health-status
        tier: baseline
        model: per_request
        cost_usd: 0
        currency: USD
        billing_code: health_check
      security: []
      responses:
        "200":
          description: Service is up.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [healthy, degraded, down]
                  timestamp:
                    type: string
                    format: date-time
                  version:
                    type: string
                    example: 3.0.0-agent
                  services:
                    type: object
                    additionalProperties: true
                  capabilities:
                    type: object
                    additionalProperties: true
                  teo_coverage:
                    type: object
                    description: Coverage of returns_gross at the newest teo in security_history vs stock universe; sparse values suggest the latest session is still backfilling (10% threshold).
                    properties:
                      latest_teo:
                        type: string
                        format: date
                        nullable: true
                      universe_stock_count:
                        type: integer
                      non_null_returns_symbol_count:
                        type: integer
                      latest_teo_coverage_pct:
                        type: number
                        nullable: true
                        description: Percent 0–100 of universe with non-null gross return at latest_teo.
                      latest_session_returns_pending:
                        type: boolean
                      query_error:
                        type: string
                  macro_factors:
                    type: object
                    nullable: true
                    description: >
                      Daily macro factor return series freshness in Supabase macro_factors (POST /correlation,
                      GET /metrics/{ticker}/correlation, GET /macro-factors). Omitted or partial if the table is empty or the query fails.
                    properties:
                      status:
                        type: string
                        enum: [healthy, stale, unavailable]
                      latest_teos:
                        type: object
                        additionalProperties:
                          type: string
                          nullable: true
                        description: Most recent teo observed per factor_key (e.g. bitcoin, vix).
                      row_count_last_7d:
                        type: integer
                      newest_teo:
                        type: string
                        format: date
                        nullable: true
                      oldest_teo:
                        type: string
                        format: date
                        nullable: true
                      stale:
                        type: boolean
                        description: True when newest_teo is older than roughly three trading days.

  /balance:
    get:
      summary: Account balance and rate limits
      description: Returns current prepaid balance, account status, and rate-limit settings for the authenticated token.
      operationId: getBalance
      tags: [Account]
      responses:
        "200":
          description: Account balance and status.
          content:
            application/json:
              schema:
                type: object
                properties:
                  email:
                    type: string
                    example: user@example.com
                  balance_usd:
                    type: number
                    format: float
                    example: 24.85
                  currency:
                    type: string
                    example: USD
                  account_type:
                    type: string
                    example: pay_as_you_go
                  status:
                    type: object
                    properties:
                      account:
                        type: string
                        example: active
                      billing:
                        type: string
                        example: ok
                      can_make_requests:
                        type: boolean
                  limits:
                    type: object
                    properties:
                      rate_limit_per_minute:
                        type: integer
                        example: 60
                      daily_request_limit:
                        type: integer
                        nullable: true
                  last_updated:
                    type: string
                    format: date-time
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Insufficient balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsufficientBalance"
        "429":
          description: Rate limit exceeded.
          headers:
            Retry-After:
              schema: { type: integer }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitExceeded"
    patch:
      summary: Update auto-refill settings
      description: >
        Updates prepaid auto-refill on `agent_accounts`. When `enabled` is true, `refill_amount_usd`
        (20, 50, or 100) and `min_threshold_tokens` (maps to USD threshold between $5 and $50) are required.
      operationId: patchBalanceAutoRefill
      tags: [Account]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled:
                  type: boolean
                  description: Enable or disable auto top-up.
                refill_amount_usd:
                  type: number
                  enum: [20, 50, 100]
                  description: Required when enabling auto-refill.
                min_threshold_tokens:
                  type: number
                  description: >
                    Token threshold; converted to USD for storage. Implied USD must be between 5 and 50
                    when enabling.
      responses:
        "200":
          description: Updated settings or current state.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: Validation error.
        "401":
          description: Unauthorized.
        "500":
          description: Server error.

  /user/billing-config:
    get:
      summary: Auto-refill billing preferences
      description: >
        Current auto-refill flags and amounts from `agent_accounts`. Same semantics as portal settings;
        use `PATCH /balance` for the alternate auto-refill field names (`enabled`, `refill_amount_usd`).
      operationId: getUserBillingConfig
      tags: [Account]
      responses:
        "200":
          description: Billing preferences.
          content:
            application/json:
              schema:
                type: object
                properties:
                  auto_top_up: { type: boolean }
                  auto_top_up_amount: { type: number }
                  auto_top_up_threshold: { type: number }
                  has_payment_method: { type: boolean }
                  allowed_refill_amounts:
                    type: array
                    items: { type: number }
                  threshold_bounds:
                    type: object
                    properties:
                      min: { type: number }
                      max: { type: number }
        "401":
          description: Unauthorized.
        "404":
          description: Agent account not found.
        "500":
          description: Server error.
    patch:
      summary: Update auto-refill billing preferences
      description: >
        Partial update of `auto_top_up`, `auto_top_up_amount` (must be 20, 50, or 100), and/or
        `auto_top_up_threshold` (USD, 5–50). Requires a saved payment method to enable auto-refill.
      operationId: patchUserBillingConfig
      tags: [Account]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                auto_top_up: { type: boolean }
                auto_top_up_amount:
                  type: number
                  enum: [20, 50, 100]
                auto_top_up_threshold:
                  type: number
                  minimum: 5
                  maximum: 50
      responses:
        "200":
          description: Updated fields.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  auto_top_up: { type: boolean }
                  auto_top_up_amount: { type: number }
                  auto_top_up_threshold: { type: number }
        "400":
          description: Validation or missing payment method.
        "401":
          description: Unauthorized.
        "500":
          description: Server error.

  /invoices:
    get:
      summary: Invoice history and spend summary
      description: Returns paginated invoice history and a summary of spend by period (month/quarter/year).
      operationId: getInvoices
      tags: [Account]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Maximum number of invoices to return.
        - name: period
          in: query
          required: false
          schema:
            type: string
            enum: [month, quarter, year]
            default: month
          description: Aggregation period for spend summary.
      responses:
        "200":
          description: Invoice list and spend summary.
          content:
            application/json:
              schema:
                type: object
                properties:
                  invoices:
                    type: array
                    items:
                      type: object
                      properties:
                        status:
                          type: string
                        amount_usd:
                          type: number
                          format: float
                  summary:
                    type: object
                    properties:
                      period:
                        type: string
                      total_invoices:
                        type: integer
                      total_spent_usd:
                        type: number
                        format: float
                      total_requests:
                        type: integer
                      current_period_cost_usd:
                        type: number
                        format: float
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Insufficient balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsufficientBalance"
        "429":
          description: Rate limit exceeded.
          headers:
            Retry-After:
              schema: { type: integer }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitExceeded"

  /auth/provision:
    post:
      summary: Provision an API key
      description: >
        Exchange a valid session JWT for a long-lived Bearer API key in format
        `rm_agent_{live|test}_{random}_{checksum}`. Intended for AI agents that need
        a stable key for repeated calls.
      operationId: provisionToken
      tags: [Authentication]
      responses:
        "200":
          description: New API key provisioned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  api_key:
                    type: string
                    example: rm_agent_live_a1b2c3d4_xyz789
                  environment:
                    type: string
                    enum: [live, test]
                  created_at:
                    type: string
                    format: date-time
        "401":
          description: Missing or invalid session JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/provision-free:
    post:
      summary: Provision a free-tier API key
      description: >
        Generate a free API key with limited daily usage (100 req/day, 10 req/min).
        No payment or email required. Returns the key once — store it immediately.
      operationId: provisionFreeToken
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agent_name]
              properties:
                agent_name:
                  type: string
                  minLength: 3
                  description: Display name for the free-tier agent (≥ 3 characters).
                  example: my-research-bot
                purpose:
                  type: string
                  description: Optional description of intended use.
                  default: development
      responses:
        "201":
          description: Free API key created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  account:
                    type: object
                    properties:
                      user_id: { type: string }
                      agent_name: { type: string }
                      tier: { type: string, enum: [free] }
                      limits:
                        type: object
                        properties:
                          queries_per_day: { type: integer, example: 100 }
                          queries_per_minute: { type: integer, example: 10 }
                  credentials:
                    type: object
                    properties:
                      api_key:
                        type: string
                        description: Shown only once. Store securely.
                        example: rm_agent_live_abc123_xyz
                      prefix: { type: string }
        "400":
          description: Invalid agent_name.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/free-tier-status:
    get:
      summary: Free-tier usage status
      description: >
        Returns current daily usage and remaining quota for a free-tier API key.
        Authenticated with Bearer token. Returns HTTP 200 with `tier` field for
        non-free accounts.
      operationId: getFreeTierStatus
      tags: [Authentication]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Free-tier usage status.
          content:
            application/json:
              schema:
                type: object
                properties:
                  tier: { type: string, example: free }
                  user_id: { type: string }
                  usage:
                    type: object
                    properties:
                      queries_today: { type: integer }
                      queries_this_month: { type: integer }
                      remaining_today: { type: integer }
                  limits:
                    type: object
                    properties:
                      queries_per_day: { type: integer, example: 100 }
                      queries_per_minute: { type: integer, example: 10 }
                  reset_date: { type: string, format: date-time }
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No account found for this API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cli/query:
    post:
      summary: Raw SQL query (SELECT only)
      description: >
        Execute a read-only SQL SELECT against the RiskModels database. Only SELECT
        statements are permitted; DML and DDL are rejected. Results capped at 10,000
        rows. Billed as `cli-query` capability. Requires valid Bearer token with
        billing balance.
      operationId: cliQuery
      tags: [Utility]
      x-pricing:
        capability_id: cli-query
        tier: baseline
        model: per_request
        cost_usd: 0.003
        currency: USD
        billing_code: cli_query_v1
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sql]
              properties:
                sql:
                  type: string
                  description: SELECT statement to execute. Multi-statement and DML/DDL are rejected.
                  example: SELECT ticker, symbol FROM symbols LIMIT 10
                limit:
                  type: integer
                  description: Max rows to return if no LIMIT clause in sql (default 100, max 10000).
                  default: 100
      responses:
        "200":
          description: Query results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items: { type: object }
                  count: { type: integer }
                  sql:
                    {
                      type: string,
                      description: Executed SQL (may have LIMIT appended).,
                    }
        "400":
          description: Invalid or disallowed SQL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Insufficient balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsufficientBalance"

  /telemetry:
    get:
      summary: Telemetry metrics
      description: >
        Performance and reliability metrics for API capabilities. Optional filter by
        capability and number of days. Cost: $0.002/call.
      operationId: getTelemetry
      tags: [Utility]
      x-pricing:
        capability_id: telemetry-metrics
        tier: baseline
        model: per_request
        cost_usd: 0.002
        currency: USD
        billing_code: telemetry_v2
      parameters:
        - name: capability
          in: query
          required: false
          schema:
            type: string
          description: Specific capability id to get metrics for.
        - name: days
          in: query
          required: false
          schema:
            type: integer
            default: 30
            minimum: 1
            maximum: 90
          description: Number of days of historical data.
      responses:
        "200":
          description: Telemetry metrics for the requested period.
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Insufficient balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsufficientBalance"
        "429":
          description: Rate limit exceeded.
          headers:
            Retry-After:
              schema: { type: integer }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitExceeded"

  /chat:
    post:
      summary: AI Risk Analyst
      description: >
        Natural language risk analysis with OpenAI tool calling against RiskModels data (DAL).
        LLM tokens are billed per the chat capability; each internal tool call is billed separately
        at the same rates as the corresponding REST endpoints (e.g. metrics-snapshot, ticker-returns).
        search_tickers is free. Returns tool_calls_summary and expanded _agent (llm_cost_usd, tool_cost_usd, tool_calls).
      operationId: postChat
      tags: [Risk Metrics]
      x-pricing:
        capability_id: chat-risk-analyst
        tier: premium
        model: per_token
        currency: USD
        billing_code: chat_risk_analyst_v2
        input_cost_per_1k: 0.001
        output_cost_per_1k: 0.002
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                messages:
                  type: array
                  items:
                    type: object
                    required: [role, content]
                    properties:
                      role: { type: string, enum: [user, assistant] }
                      content: { type: string }
                model:
                  type: string
                  description: AI model to use (default gpt-4o-mini)
                response_mode:
                  type: string
                  enum: [markdown, catalog, hybrid]
                  description: Reserved for future streaming / A2UI modes; non-streaming JSON today.
                parallel_tool_calls:
                  type: boolean
                  description: >
                    When false, sets OpenAI parallel_tool_calls to false. Omit or true for parallel
                    tool execution on supported models (e.g. gpt-4o-mini).
                execute_tools_sequentially:
                  type: boolean
                  description: When true, server executes tool calls sequentially instead of concurrently.
      responses:
        "200":
          description: >
            Assistant reply, accumulated token usage across tool rounds, optional tool_calls_summary,
            lineage metadata, and _agent cost breakdown (LLM + tools).
          headers:
            X-API-Cost-USD:
              schema: { type: string }
            X-Data-Fetch-Latency-Ms:
              schema: { type: string }
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    required: [role, content]
                    properties:
                      role:
                        type: string
                        enum: [assistant]
                      content:
                        type: string
                  model:
                    type: string
                  usage:
                    type: object
                    nullable: true
                    properties:
                      prompt_tokens: { type: integer }
                      completion_tokens: { type: integer }
                      total_tokens: { type: integer }
                  tool_calls_summary:
                    type: array
                    nullable: true
                    items:
                      $ref: "#/components/schemas/ChatToolCallSummary"
                  _metadata:
                    type: object
                    additionalProperties: true
                  _agent:
                    $ref: "#/components/schemas/AgentMeta"
        "400":
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Insufficient balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsufficientBalance"
        "429":
          description: Rate limit exceeded.
          headers:
            Retry-After:
              schema: { type: integer }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitExceeded"
        "502":
          description: Upstream AI provider error.
        "503":
          description: Chat not configured (e.g. missing OPENAI_API_KEY).

  /pricing:
    get:
      summary: Public capability pricing manifest
      description: >
        Machine-readable pricing for all registered capabilities (tier, model, `cost_usd`, token rates,
        `min_charge`, `billing_code`). Public; no authentication. Cached at the edge.
      operationId: getPricingManifest
      tags: [Discovery]
      security: []
      responses:
        "200":
          description: Pricing manifest JSON (`version`, `currency`, `tiers`, `endpoints`, `estimate_endpoint`, `docs`).
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /data/funds/{bw_fund_id}:
    get:
      summary: Get fund (registry + latest snapshot)
      description: >
        Returns the registry row from `public.funds` joined with the latest
        knowledge-mode snapshot from `public.funds_latest`. Bitemporal lineage
        surfaces as response headers `X-Data-As-Of` (= `report_date`) and
        `X-Data-Filing-Date` (= `filing_date`).


        v1 returns the latest knowledge-mode answer only (no `?as_of=` /
        `?mode=` query params — deferred to v2 per
        ARCHITECTURE_FUNDS_API.md §3.5).
      operationId: getFundDataPlane
      tags: [Funds Data Plane]
      security:
        - BearerAuth: []
        - {}
      parameters:
        - name: bw_fund_id
          in: path
          required: true
          schema: { type: string }
          example: BW-FUND-S000004310
      responses:
        "200":
          description: Fund + latest snapshot.
          headers:
            X-Data-As-Of:
              schema: { type: string, format: date }
              description: funds_latest.report_date (period end of the snapshot).
            X-Data-Filing-Date:
              schema: { type: string, format: date }
              description: funds_latest.filing_date (SEC acceptance date).
            X-Risk-Model-Version:
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FundWithLatest"
        "404":
          description: Fund not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /data/funds-latest/{bw_fund_id}:
    get:
      summary: Get just the funds_latest row
      description: >
        Returns only the wide-row snapshot from `public.funds_latest`. Skips
        the registry join — useful when the SDK already has the registry row
        or only needs the metric columns.
      operationId: getFundLatestDataPlane
      tags: [Funds Data Plane]
      security:
        - BearerAuth: []
        - {}
      parameters:
        - name: bw_fund_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Latest snapshot row.
          headers:
            X-Data-As-Of:
              schema: { type: string, format: date }
            X-Data-Filing-Date:
              schema: { type: string, format: date }
            X-Risk-Model-Version:
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FundLatest"
        "404":
          description: No funds_latest row for this fund.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /data/funds/batch:
    post:
      summary: Resolve multiple funds in one call
      description: >
        Multi-fund lookup. Returns a registry+latest payload keyed by
        `bw_fund_id`. Up to 1000 ids per request.
      operationId: postFundsBatchDataPlane
      tags: [Funds Data Plane]
      security:
        - BearerAuth: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FundsBatchRequest"
      responses:
        "200":
          description: Lookup map.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FundsBatchResponse"
        "400":
          description: Invalid body (missing/oversized fund_ids array).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /data/funds/search:
    get:
      summary: Search funds by ticker or name
      description: >
        Full-text ilike search over `ticker` and `fund_name`, optionally
        filtered by 9-box style cell (slug or canonical name) and
        share-class primary flag (`?primary=true` filters
        `primary_bw_fund_id IS NULL`).
      operationId: getFundsSearchDataPlane
      tags: [Funds Data Plane]
      security:
        - BearerAuth: []
        - {}
      parameters:
        - name: q
          in: query
          schema: { type: string }
          description: ilike pattern on ticker / fund_name.
        - name: equity_style_9box
          in: query
          schema: { type: string }
          description: 9-box slug ("large-blend") or canonical name ("Large Blend").
        - name: primary
          in: query
          schema: { type: boolean, default: false }
          description: When true, returns only primary share-class funds (Q5 lock).
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 500, default: 50 }
      responses:
        "200":
          description: Up to `limit` matching funds.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FundsSearchResponse"

  /data/funds/style/{slug}/members:
    get:
      summary: List fund_ids in a 9-box style cell
      description: >
        Returns the `bw_fund_id` list for a 9-box style cell. SDK consumers
        typically chain this into `/api/data/funds/batch` to materialize a
        peer cohort's full registry+latest payload.
      operationId: getStyleCellMembersDataPlane
      tags: [Funds Data Plane]
      security:
        - BearerAuth: []
        - {}
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            enum:
              - large-value
              - large-blend
              - large-growth
              - mid-value
              - mid-blend
              - mid-growth
              - small-value
              - small-blend
              - small-growth
        - name: primary
          in: query
          schema: { type: boolean, default: false }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 20000, default: 5000 }
      responses:
        "200":
          description: Fund id list for the cell.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FundsStyleMembersResponse"
        "400":
          description: Invalid style slug.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /funds/{bw_fund_id}:
    get:
      summary: Latest fund metrics
      description: >
        Knowledge-mode portfolio return decomposition + diagnostics for a
        single mutual fund. Returns the gross / market / sector / subsector
        / idiosyncratic return components from the per-fund Slice 8 zarr
        (materialized in `public.funds_latest`), plus diagnostics
        (`weight_sum`, `n_holdings_active`, `effective_n`,
        `top10_weight_sum`) and registry-side meta. Bitemporal lineage on
        response headers (`X-Data-As-Of`, `X-Data-Filing-Date`).


        Per-fund time series, holdings panel, and hedge ratios live in
        GCS Zarr and ship under `/funds/{bw_fund_id}/portfolio`,
        `/holdings`, `/hedge` in Stage B.2.


        v1 returns the latest knowledge-mode answer only — `?as_of=` /
        `?mode=` is deferred to v2 (schema is forward-compatible).
      operationId: getFundMetrics
      tags: [Funds]
      x-pricing:
        capability_id: fund-metrics
        tier: baseline
        cost_usd: 0.005
        billing_code: fund_metrics_v1
      parameters:
        - name: bw_fund_id
          in: path
          required: true
          schema: { type: string }
          example: BW-FUND-S000004310
      responses:
        "200":
          description: Latest fund metrics.
          headers:
            X-Data-As-Of:
              schema: { type: string, format: date }
              description: funds_latest.report_date (period end of the snapshot).
            X-Data-Filing-Date:
              schema: { type: string, format: date }
              description: funds_latest.filing_date (SEC acceptance date).
            X-Risk-Model-Version:
              schema: { type: string }
            X-API-Cost-USD:
              schema: { type: string }
              description: USD cost deducted from prepaid balance for this request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FundMetricsResponse"
        "402":
          description: Insufficient prepaid balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsufficientBalance"
        "404":
          description: Fund not found, or registry exists but no funds_latest row yet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitExceeded"

tags:
  - name: Risk Metrics
    description: ERM3 factor hedge ratios, explained risk, and return decompositions.
  - name: Utility
    description: Ticker search, health, and service discovery.
  - name: Account
    description: Balance, billing, and invoice management.
  - name: Webhooks
    description: Outbound webhook subscriptions (e.g. batch completion).
  - name: Authentication
    description: API key provisioning and OAuth2 token management.
  - name: MCP
    description: Model Context Protocol server endpoints for AI agents.
  - name: Plaid Integration
    description: Live portfolio synchronization via Plaid Investments API.
  - name: Compliance
    description: AI marketplace compliance and discovery manifests.
  - name: Privacy
    description: Data handling and privacy disclosure.
  - name: Discovery
    description: Service discovery and capability manifests.
  - name: Funds Data Plane
    description: >
      Raw-shape reads against the funds Supabase tables (`funds`,
      `funds_latest`). Latest knowledge-mode snapshot only — history reads
      via the per-fund Zarr endpoints in later stages. Public; soft Bearer
      auth; not metered. The compute-bearing `/funds/*`,
      `/funds/style/*`, and `/funds/snapshot/*` surfaces ship in subsequent
      stages.
  - name: Funds
    description: >
      Compute-bearing fund endpoints. Latest metrics (Stage B.1) join
      `public.funds` with `public.funds_latest` and return a shaped
      response with bitemporal lineage. Per-fund time series, holdings,
      and hedge ratios (Stage B.2) read from GCS Zarr. Style-cohort
      surfaces (Stage C) and snapshot tearsheets (Stage D) follow.
      Billable per request.
