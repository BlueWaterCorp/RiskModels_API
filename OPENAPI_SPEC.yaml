  /batch/analyze:
    post:
      summary: Multi-ticker batch analysis
      description: >
        Fetch data for up to 100 tickers in one JSON response (`results` map keyed by ticker).
        Supported `metrics` flags: `returns` (daily arrays with `l1`/`l2`/`l3` columns — see operation
        schema for semantics), `hedge_ratios` (latest six hedge ratios with **short** keys `l1_market`, …),
        `full_metrics` (flat L1/L2/L3 ER/HR snapshot with **long** keys `l1_market_hr`, `l1_market_er`, …).
        Request every block you need: `metrics` is a whitelist (no silent backfill). For ERM3 zarr parity
        (`L*_ER` / `L*_HR`), request `["full_metrics","hedge_ratios"]` and see docs/ERM3_ZARR_API_PARITY.md.
        The `l3_decomposition` flag is accepted but may be unpopulated depending on deployment. Cost:
        $0.005/position, minimum $0.01/call.

        **Parquet/CSV:** When `format` is `parquet` or `csv`, the response is a single long-format table
        of daily rows (`ticker`, `date`, `gross_return`, `l1`, `l2`, `l3`) per `#/components/schemas/BatchAnalyzeExportRow`.
        Only tickers with successful `returns` payloads are included; `full_metrics`, `hedge_ratios`, and
        `l3_decomposition` are not exported in tabular form. Ensure `metrics` includes `returns` or the
        table may be empty.
      operationId: batchAnalyze
      tags: [Risk Metrics]
      x-pricing:
        capability_id: batch-analysis
        tier: premium
        model: per_position
        cost_usd: 0.005
        min_charge: 0.01
        currency: USD
        billing_code: batch_analysis_v3
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tickers, metrics]
              properties:
                tickers:
                  type: array
                  items:
                    type: string
                  maxItems: 100
                  description: List of ticker symbols. Maximum 100.
                  example: ["AAPL", "MSFT", "NVDA", "GOOGL"]
                metrics:
                  type: array
                  items:
                    type: string
                    enum:
                      [returns, l3_decomposition, hedge_ratios, full_metrics]
                  description: Which payloads to include per ticker (`full_metrics` recommended for portfolio screens).
                  example: ["full_metrics"]
                years:
                  type: integer
                  minimum: 1
                  maximum: 15
                  default: 1
                  description: Number of years of history (applies to `returns` and `l3_decomposition`).
                format:
                  type: string
                  enum: [json, parquet, csv]
                  default: json
                  description: >
                    `json` (default): `BatchAnalyzeResponse` with `results`, `summary`, `_agent`, `_metadata`.
                    `parquet` / `csv`: long-format daily table only — see operation description and
                    `#/components/schemas/BatchAnalyzeExportRow`. Requires `returns` in `metrics` for non-empty data.
      responses:
        "200":
          description: >
            Batch results as JSON (`results` map) or as a single Parquet/CSV table of merged daily `returns`
            rows across tickers.
          headers:
            X-Risk-Model-Version:
              schema: { type: string }
              description: ERM3 model version (align with zarr slice / `_metadata.model_version`).
            X-Data-As-Of:
              schema: { type: string, format: date }
              description: Latest trading date for the batch snapshot.
            X-Factor-Set-Id:
              schema: { type: string }
              description: Factor set identifier (e.g. SPY_uni_mc_3000).
            X-Universe-Size:
              schema: { type: integer }
              description: Universe count for this model build.
            X-API-Cost-USD:
              schema: { type: string }
            X-Request-ID:
              schema: { type: string }
          content:
            application/vnd.apache.parquet:
              schema:
                type: string
                format: binary
              description: >
                Apache Parquet long table; columns per `#/components/schemas/BatchAnalyzeExportRow`.
                Tickers without `returns` data are omitted; failed tickers are omitted.
            text/csv:
              schema:
                type: string
              description: >
                UTF-8 CSV with header `ticker,date,gross_return,l1,l2,l3`; semantics match Parquet.
              example: |
                ticker,date,gross_return,l1,l2,l3
                AAPL,2025-03-20,0.005,0.92,0.15,0.04
                MSFT,2025-03-20,-0.002,0.88,0.11,0.03
            application/json:
              schema:
                $ref: "#/components/schemas/BatchAnalyzeResponse"
        "400":
          description: Invalid request body or too many tickers (> 100).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Insufficient balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsufficientBalance"
        "429":
          description: Rate limit exceeded.
          headers:
            Retry-After:
              schema: { type: integer }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitExceeded"

  /portfolio/risk-index:
    post:
      summary: Portfolio risk index (L3 variance decomposition)
      description: >
        Holdings-weighted L3 explained-risk decomposition (market, sector, subsector, residual),
        approximate portfolio volatility (weighted `vol_23d`), and optional daily time series of
        portfolio ER over `years`. Partial resolution: unresolved tickers appear in `errors`;
        computation uses resolved positions only. Metered; includes `_agent` and `_metadata`.

        **Billing:** $0.03 per request (empty `positions` / syncing placeholder responses are not charged).
      operationId: postPortfolioRiskIndex
      tags: [Risk Metrics]
      x-pricing:
        capability_id: portfolio-risk-index
        tier: premium
        model: per_request
        cost_usd: 0.03
        currency: USD
        billing_code: portfolio_risk_index_v2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [positions]
              properties:
                positions:
                  type: array
                  maxItems: 100
                  items:
                    type: object
                    required: [ticker, weight]
                    properties:
                      ticker:
                        type: string
                      weight:
                        type: number
                        format: float
                        exclusiveMinimum: 0
                        description: Fractional weights (normalized server-side) or dollar notionals.
                  description: >
                    May be empty when holdings are not yet available (e.g. Plaid initial sync). In that case the API returns HTTP 200 with `status: "syncing"` and a message instead of portfolio aggregates.
                timeSeries:
                  type: boolean
                  default: false
                  description: When true, include `time_series` of daily portfolio ER.
                years:
                  type: integer
                  minimum: 1
                  maximum: 15
                  default: 1
                  description: History span when `timeSeries` is true.
      responses:
        "200":
          description: >-
            Portfolio aggregates, per-ticker breakdown, optional time series; or status "syncing" when
            positions is empty (Plaid / holdings not ready).
          headers:
            X-API-Cost-USD:
              schema: { type: string }
            X-Data-Fetch-Latency-Ms:
              schema: { type: string }
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [syncing]
                    description: Present only when `positions` was empty (holdings not ready).
                  message:
                    type: string
                    description: Human-readable hint when status is syncing.
                  portfolio_risk_index:
                    type: object
                    properties:
                      variance_decomposition:
                        type: object
                        properties:
                          market: { type: number, nullable: true }
                          sector: { type: number, nullable: true }
                          subsector: { type: number, nullable: true }
                          residual: { type: number, nullable: true }
                          systematic: { type: number, nullable: true }
                      portfolio_volatility_23d: { type: number, nullable: true }
                      position_count: { type: integer }
                  per_ticker:
                    type: object
                    additionalProperties: true
                  summary:
                    type: object
                    properties:
                      total_positions: { type: integer }
                      resolved: { type: integer }
                      errors: { type: integer }
                  time_series:
                    type: array
                    items:
                      type: object
                      properties:
                        date: { type: string, format: date }
                        market_er: { type: number }
                        sector_er: { type: number }
                        subsector_er: { type: number }
                        residual_er: { type: number }
                        systematic_er: { type: number }
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        ticker: { type: string }
                        error: { type: string }
                  _agent:
                    $ref: "#/components/schemas/AgentMeta"
                  _metadata:
                    type: object
                    additionalProperties: true
        "400":
          description: Invalid body or no resolvable tickers.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Insufficient balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsufficientBalance"
        "429":
          description: Rate limit exceeded.
          headers:
            Retry-After:
              schema: { type: integer }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitExceeded"

  /portfolio/risk-snapshot:
    post:
      summary: Portfolio risk snapshot (bundled PDF or JSON)
      description: >
        One bundled report for a weighted portfolio: L3 explained-risk decomposition, per-name hedge ratios,
        and volatility. Uses internal data access only (no separate charges for underlying metrics calls).
        `format=json` returns structured data; `format=pdf` returns `application/pdf`. `format=png` is not
        implemented yet (501). Identical requests are cached 24 hours per user; cache hits return `X-Cache: HIT`
        and `X-API-Cost-USD: 0`.

