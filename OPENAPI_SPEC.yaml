openapi: 3.0.3
info:
  title: RiskModels API
  version: 3.0.0-agent
  description: >
    POST /decompose returns variance shares and ETF hedge ratios for any US equity,
    separating factor exposure from the residual bet so you can hedge what you don't want.
    Daily history to 2006 across ~3,000 US equities.

    Precision equity risk intelligence platform with AI agent integration.


    **New in v3.0.0-agent:**

    - OAuth2 client credentials flow for machine-to-machine auth

    - Plaid Investments integration for live portfolio sync

    - MCP (Model Context Protocol) server for AI agent tools

    - Compliance manifests for AI marketplace integration

    - Per-key rate limiting and scoped access control


    **Data**: Universe `uni_mc_3000` (top ~3,000 US stocks by market cap), date range
    2006-01-04 to present, updated daily end-of-day. Model outputs are computed by the ERM3
    regression system (Huber/Ridge), with Zarr v2 archives on Google Cloud Storage for research
    pipelines. The live API reads primarily from Supabase **V3** tables: long-form
    `security_history` (returns, volatility, L1/L2/L3 hedge ratios and explained-risk metrics),
    wide latest rows in `security_history_latest`, identity in `symbols`, plus supporting surfaces
    such as `trading_calendar`, `erm3_landing_chart_cache`, and `macro_factors`. Cross-sectional
    **rankings** (`GET /rankings/*`) are served from precomputed rank metric keys in
    `security_history`, not a separate `erm3_rankings` table. Hedge ratios (`*_hr`) are
    **dollar_ratio** ETF notionals per $1 stock and are distinct from regression **betas**
    (`l1_mkt_beta`, `l2_sec_beta`, `l3_sub_beta`), which are dimensionless coefficients from
    the hierarchical L1/L2/L3 regression. Both are exposed under `MetricsV3` and on
    `security_history_latest`. See `SEMANTIC_ALIASES.md` for the full HR-vs-beta convention.


    **Authentication Methods:**

    1. Session cookies (web app)

    2. API Key/Secret via Bearer token (external integrations)

    3. OAuth2 client credentials (AI agents, npm package)


    **Security Features:**

    - GCP KMS envelope encryption for portfolio data

    - Cryptographic shredding on key deletion

    - HMAC-SHA256 webhook verification

    - Row-level security (RLS) via Supabase


    **Pricing**: Per-request billing with prepaid balance. Cached responses are free.
    Many metered responses include `_agent.cost_usd` in the JSON body; others bill silently — always
    check the `X-API-Cost-USD` response header when present. Metered operations also expose
    `x-pricing` (OpenAPI extension) with `capability_id`, `tier` (`baseline` | `premium`), `model`,
    `cost_usd`, `billing_code`, and optional `min_charge` / per-token fields — aligned with
    `GET /pricing` and `lib/agent/capabilities.ts`.

    **Lineage**: JSON data responses include `_metadata` (model version, data_as_of, factor set)
    and headers `X-Risk-Model-Version`, `X-Data-As-Of`, `X-Factor-Set-Id`, `X-Universe-Size`.
    Parquet and CSV bodies omit `_metadata`; use the same `X-Risk-*` headers on the HTTP response.

    **Tabular exports (Parquet / CSV):** For bulk historical loads, time-series endpoints accept
    `format=parquet` or `format=csv`, or (when `format` is omitted) `Accept: application/vnd.apache.parquet`
    or `Accept: text/csv`. Successful responses use `Content-Type: application/vnd.apache.parquet` or
    `text/csv; charset=utf-8` and `Content-Disposition: attachment` with a descriptive filename.
    Each export is a single flat table; column names and types match the per-operation schemas referenced
    in the response media type descriptions (aligned with JSON row objects or zipped parallel arrays).
    Parquet is produced via schema inference from the first row (UTF8 strings, DOUBLE floats, INT64 integers,
    BOOLEAN, TIMESTAMP_MILLIS for JavaScript Date values). CSV uses a header row, comma separators, UTF-8,
    and RFC 4180-style quoting when needed. Prefer Parquet for typed columnar stacks (pandas, Polars, Arrow);
    use CSV for spreadsheets and lightweight scripting.

  contact:
    name: RiskModels Support
    email: service@riskmodels.app
    url: https://riskmodels.app

  termsOfService: https://riskmodels.app/legal
  license:
    name: Commercial
    url: https://riskmodels.app/legal

servers:
  - url: https://riskmodels.app/api
    description: Production

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: rm_agent_{environment}_{random}_{checksum}
      description: >
        API key in format `rm_agent_{live|test}_{random}_{checksum}` or `rm_user_{random}_{checksum}`.
        Obtain via `POST /api/auth/provision` or from riskmodels.app/settings → API Keys.
        Include as: `Authorization: Bearer rm_agent_live_...`

    OAuth2ClientCredentials:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://riskmodels.app/api/auth/token
          scopes:
            ticker-returns: Access ticker returns and historical data
            risk-decomposition: Access L3 risk decomposition
            batch-analysis: Perform portfolio batch analysis
            factor-correlation: Correlate stocks with macro factors (VIX, Bitcoin, Gold, etc.)
            macro-factor-series: Download daily macro factor return series (no ticker)
            chat-risk-analyst: Use AI risk analyst
            plaid:holdings: Access Plaid-synced portfolio holdings
            "*": Full API access

  parameters:
    FormatQueryTabular:
      name: format
      in: query
      required: false
      schema:
        type: string
        enum: [json, parquet, csv]
        default: json
      description: >
        Response carrier. `json` (default): structured payload for this operation (body includes
        `_metadata` where documented). `parquet` / `csv`: a single flat table of time-series rows only —
        lineage comes from `X-Risk-Model-Version`, `X-Data-As-Of`, `X-Factor-Set-Id`, `X-Universe-Size`.
        When this parameter is omitted, `Accept: application/vnd.apache.parquet` or `Accept: text/csv`
        selects the tabular format.

  schemas:
    AgentMeta:
      type: object
      description: Per-request billing and telemetry metadata appended to metered responses.
      properties:
        cost_usd:
          type: number
          format: float
          description: Cost deducted from prepaid balance for this request. 0 if served from cache.
          example: 0.005
        latency_ms:
          type: integer
          description: Server processing time in milliseconds.
          example: 145
        request_id:
          type: string
          description: Unique request identifier for support lookups.
          example: req_abc123xyz
        confidence:
          type: object
          properties:
            overall:
              type: number
              format: float
              minimum: 0
              maximum: 1
              example: 0.98
            factors:
              type: object
              additionalProperties:
                type: number
        data_freshness:
          type: string
          format: date-time
          description: ISO timestamp of the data's as-of datetime.
          example: "2026-02-21T10:30:00Z"
        billing_code:
          type: string
          description: Internal billing classification for this request type.
          example: ticker_returns_v2
        cache_status:
          type: string
          enum: [HIT, MISS, BYPASS]
          description: Whether this response was served from cache.
        llm_cost_usd:
          type: number
          format: float
          description: >
            POST /chat only: portion of cost from LLM token billing (estimated preflight charge).
        tool_cost_usd:
          type: number
          format: float
          description: POST /chat only; sum of internal data tool charges for this turn.
        tool_calls:
          type: integer
          description: POST /chat only; number of tool invocations in this request.

    ChatToolCallSummary:
      type: object
      description: One internal tool invocation from POST /chat (billing + latency).
      properties:
        tool:
          type: string
          description: OpenAI function name (e.g. get_risk_metrics).
        capability:
          type: string
          nullable: true
          description: Billing capability id, or null for free tools (e.g. search_tickers).
        cost_usd:
          type: number
          format: float
        latency_ms:
          type: integer
        error:
          type: string
          nullable: true

    RiskMetadata:
      type: object
      description: >
        Lineage and provenance metadata for all data responses.
        Included in response body as _metadata and as X-Risk-* headers.
      properties:
        model_version:
          type: string
          description: ERM3 model version (e.g. ERM3-L3-v30).
          example: "ERM3-L3-v30"
        data_as_of:
          type: string
          format: date
          description: Latest trading date reflected in the response (model outputs / latest snapshot).
          example: "2026-03-17"
        factor_set_id:
          type: string
          description: Factor set identifier.
          example: "SPY_uni_mc_3000"
        universe_size:
          type: integer
          description: Number of stocks in the universe.
          example: 2987
        wiki_uri:
          type: string
          format: uri
          description: Methodology documentation URL.
          example: "https://riskmodels.app/docs/methodology/erm3-l3"
        factors:
          type: array
          items:
            type: string
          description: L3 factor ETF tickers (market + 11 sectors).
          example:
            [
              "SPY",
              "XLK",
              "XLF",
              "XLV",
              "XLE",
              "XLI",
              "XLY",
              "XLP",
              "XLU",
              "XLB",
              "XLRE",
              "XLC",
            ]
        data_source:
          type: string
          enum: [zarr]
          description: >
            Present on history-style JSON responses. Always `"zarr"` as of the pure-Zarr SSOT
            cutover: all historical time series (daily metrics, hedge weights, returns
            decomposition, rankings) are served from consolidated Zarr stores on GCS. The
            Supabase `security_history` table has been removed; the legacy `"supabase"` value
            is retained in clients only for backwards compatibility.
        range:
          type: array
          minItems: 2
          maxItems: 2
          items:
            type: string
            format: date
          description: >
            Optional inclusive ISO date bounds of the returned history window when `data_source` is set.
          example: ["2018-01-02", "2026-04-14"]

    EstimateResponse:
      type: object
      description: Cost estimate for a request before it is made.
      required:
        - estimated_cost_usd
        - capability
        - pricing_model
        - note
      properties:
        estimated_cost_usd:
          type: number
          format: float
          example: 0.008
        estimated_tokens:
          type: integer
          example: 400
        estimated_rows:
          type: integer
          description: Estimated row count for time-series endpoints.
        estimated_bytes:
          type: integer
          description: Estimated response size in bytes.
        capability:
          type: string
          example: "ticker-returns"
        pricing_model:
          type: string
          enum: [per_request, per_position, per_token, subscription]
        unit_cost_usd:
          type: number
          format: float
        min_charge:
          type: number
          format: float
        note:
          type: string
          example: "Actual cost may vary. Cached responses are free."

    MetricsV3:
      type: object
      description: >
        V3 metric keys as returned inside `GET /metrics/{ticker}` under the `metrics` property.
        Suffixes: `_mkt` market, `_sec` sector, `_sub` subsector, `_res` residual.
        Hedge ratios (HR) are dollars of ETF to trade per $1 of stock; explained risk (ER) are variance fractions (0–1).
        Keys `l1_cfr`–`l3_rr` are daily simple returns from returns decomposition:
          - `*_cfr` (combined factor return) is CUMULATIVE through the level: `l1_cfr = l1_fr`,
            `l2_cfr = l1_fr + l2_fr`, `l3_cfr = l1_fr + l2_fr + l3_fr`.
          - `*_fr`  (factor return, INCREMENTAL) is each level's own contribution —
            `l2_fr` is what the sector factor adds on top of L1 alone, `l3_fr` is what
            the subsector factor adds on top of L1+L2. Use these for stacked-bar decomposition
            charts or for agent-side attribution ("what drove today's return at each level?").
          - `*_rr`  (residual return) is what's left after factors through that level —
            `gross_return ≈ l3_cfr + l3_rr`.
        None of these are ER fields and none come from hedge-weight explainability.
        Keys `l1_mkt_beta`, `l2_sec_beta`, `l3_sub_beta` are dimensionless hierarchical regression betas
        (one per level: 1 for L1, 2 for L2, 3 for L3 — though only the L*-introduced new factor is stored at each level).
        These are NOT the same as hedge ratios — betas are regression coefficients, hedge ratios are dollar-notional ratios.
      properties:
        vol_23d:
          type: number
          format: float
          nullable: true
          description: Annualised realised volatility (23 trading days), decimal fraction.
        vol_252d_ann:
          type: number
          format: float
          nullable: true
          description: >
            Annualised realised volatility over the trailing ~252 trading days,
            decimal fraction. Computed on demand from daily `returns_gross` and cached
            per (symbol, data_as_of); matches the horizon of 1y return cascades so
            callers can size positions on a common basis. Null when fewer than 20
            usable daily observations are available.
        price_close:
          type: number
          format: float
          nullable: true
        market_cap:
          type: number
          format: float
          nullable: true
        stock_var:
          type: number
          format: float
          nullable: true
        l1_mkt_hr:
          type: number
          format: float
          nullable: true
        l1_mkt_er:
          type: number
          format: float
          nullable: true
        l1_res_er:
          type: number
          format: float
          nullable: true
        l1_cfr:
          type: number
          format: float
          nullable: true
          description: >
            Daily simple combined factor return through L1 (market), decimal (same convention as returns_gross).
            From returns-decomposition zarr (ds_erm3_returns), not hedge weights. Not a variance fraction — unlike l1_mkt_er.
            At L1 this is equal to l1_fr (there's no level below market to add on top of).
        l1_fr:
          type: number
          format: float
          nullable: true
          description: >
            Daily simple factor return for L1 (market) — the INCREMENTAL contribution of the
            market factor alone. At L1 this equals l1_cfr. Use `l1_fr`/`l2_fr`/`l3_fr` for
            stacked-bar factor decomposition charts and for per-level P&L attribution.
        l1_rr:
          type: number
          format: float
          nullable: true
          description: Daily simple residual return at L1 (decimal). Not l1_res_er (explained risk).
        l2_mkt_hr:
          type: number
          format: float
          nullable: true
        l2_sec_hr:
          type: number
          format: float
          nullable: true
        l2_mkt_er:
          type: number
          format: float
          nullable: true
        l2_sec_er:
          type: number
          format: float
          nullable: true
        l2_res_er:
          type: number
          format: float
          nullable: true
        l2_cfr:
          type: number
          format: float
          nullable: true
          description: Daily simple combined factor return through L2 (market + sector), decimal. Equals l1_fr + l2_fr.
        l2_fr:
          type: number
          format: float
          nullable: true
          description: >
            Daily simple factor return for L2 (sector) — the INCREMENTAL contribution the
            sector factor adds on top of L1 (market). For a sector-led rally this is the
            number to highlight in charts.
        l2_rr:
          type: number
          format: float
          nullable: true
          description: Daily simple residual return at L2 (decimal).
        l3_mkt_hr:
          type: number
          format: float
          nullable: true
        l3_sec_hr:
          type: number
          format: float
          nullable: true
        l3_sub_hr:
          type: number
          format: float
          nullable: true
        l3_mkt_er:
          type: number
          format: float
          nullable: true
        l3_sec_er:
          type: number
          format: float
          nullable: true
        l3_sub_er:
          type: number
          format: float
          nullable: true
        l3_res_er:
          type: number
          format: float
          nullable: true
          description: Idiosyncratic variance fraction at L3.
        l3_cfr:
          type: number
          format: float
          nullable: true
          description: Daily simple combined factor return through L3 (market + sector + subsector), decimal. Equals l1_fr + l2_fr + l3_fr.
        l3_fr:
          type: number
          format: float
          nullable: true
          description: >
            Daily simple factor return for L3 (subsector) — the INCREMENTAL contribution the
            subsector factor adds on top of L1 + L2. Completes the three-level stacked
            decomposition: l1_fr + l2_fr + l3_fr + l3_rr ≈ gross_return.
        l3_rr:
          type: number
          format: float
          nullable: true
          description: Daily simple residual return at L3 (decimal). Distinct from l3_residual_er (ER).
        l1_mkt_beta:
          type: number
          format: float
          nullable: true
          description: >
            Hierarchical regression beta to the symbol's L1 market factor (always SPY). Dimensionless
            (units of stock-return per unit of factor-return). One value per symbol from the L1 model.
            Sourced from `ds_erm3_betas` `factor_beta` at `fact_level=1`. NOT a hedge ratio (which is
            dollar-notional). NOT classical univariate beta — see `SEMANTIC_ALIASES.md` for the
            multivariate-vs-univariate convention.
        l2_sec_beta:
          type: number
          format: float
          nullable: true
          description: >
            Hierarchical regression beta to the symbol's L2 sector factor — the symbol's specific sector ETF
            (e.g. XLK for AAPL, XLF for JPM). Dimensionless. From `ds_erm3_betas` `factor_beta` at
            `fact_level=2`. Null when the symbol has no sector classification.
        l3_sub_beta:
          type: number
          format: float
          nullable: true
          description: >
            Hierarchical regression beta to the symbol's L3 subsector factor — the symbol's specific
            subsector ETF (e.g. RSPT for AAPL, KBE for JPM). Dimensionless. From `ds_erm3_betas`
            `factor_beta` at `fact_level=3`. Null when the symbol has no subsector classification.

    DecomposeRequest:
      type: object
      description: Request body for `POST /decompose`.
      required:
        - ticker
      properties:
        ticker:
          type: string
          description: Stock ticker symbol (case-insensitive; trimmed and upper-cased).
          example: NVDA

    DecomposeLayer:
      type: object
      description: >
        One layer of the four-bet decomposition. `er` is a variance fraction in
        [0, 1]. `hr` is a dollar-ratio hedge ratio (dollars of ETF per $1 of
        stock). `residual` has no tradable ETF, so `hr` and `hedge_etf` are
        null for that layer.
      required:
        - er
        - hr
        - hedge_etf
      properties:
        er:
          type: number
          nullable: true
          description: Explained-risk variance fraction for this layer.
          example: 0.22
        hr:
          type: number
          nullable: true
          description: Hedge ratio (dollar ratio) for this layer. Null for residual.
          example: 0.35
        hedge_etf:
          type: string
          nullable: true
          description: Tradable ETF for this layer. Null for residual.
          example: XLK

    DecomposeResponse:
      type: object
      description: >
        Wire response for `POST /decompose`. Semantic four-layer shape; each
        tradable layer maps to one ETF. The top-level `hedge` map is the
        negative of each layer's `hr` keyed by ETF (ready to convert into
        short notionals).
      required:
        - ticker
        - symbol
        - data_as_of
        - teo
        - exposure
        - hedge
      properties:
        ticker:
          type: string
          example: NVDA
        symbol:
          type: string
          description: Canonical symbol key in V3 registry.
        data_as_of:
          type: string
          format: date
          description: Latest trading day the metrics apply to.
        teo:
          type: string
          format: date
          description: V3 observation date (time-end) for this row.
        exposure:
          type: object
          required: [market, sector, subsector, residual]
          properties:
            market:
              $ref: "#/components/schemas/DecomposeLayer"
            sector:
              $ref: "#/components/schemas/DecomposeLayer"
            subsector:
              $ref: "#/components/schemas/DecomposeLayer"
            residual:
              $ref: "#/components/schemas/DecomposeLayer"
        hedge:
          type: object
          additionalProperties:
            type: number
          description: >
            Map of hedge-ETF → dollar ratio (= negative of the layer `hr`).
            If two layers share the same ETF (e.g. subsector falls back to
            the sector ETF), the values are summed so each ETF appears once.
          example:
            SPY: -1.10
            XLK: -0.35
            SMH: -0.60
        _metadata:
          type: object
          description: Lineage, billing code, and freshness (same shape as `/metrics`).
        _data_health:
          type: object
          properties:
            er_populated:
              type: boolean
            er_sum:
              type: number
              nullable: true
              description: Sum of L3 ER layers (should be ≈ 1 within tolerance).

    CanonicalSnapshotPortfolioRequest:
      type: object
      description: >
        Request body for `POST /api/snapshot` when `type` is `portfolio`. Each position must
        include exactly one of `weight` (fractional or dollar — normalized to weights) or `shares`
        (converted using latest `price_close`). Do not mix weight-based and share-based rows in one request.
      required: [type, portfolio]
      properties:
        type:
          type: string
          enum: [portfolio]
        portfolio:
          type: array
          minItems: 1
          maxItems: 100
          items:
            type: object
            required: [ticker]
            properties:
              ticker:
                type: string
                description: US equity ticker (case-insensitive; normalized to uppercase).
              weight:
                type: number
                format: float
                exclusiveMinimum: 0
                description: Positive weight or dollar amount (server normalizes to sum to 1).
              shares:
                type: number
                format: float
                exclusiveMinimum: 0
                description: Share count; converted to weights using latest `price_close`.
        lookback_days:
          type: integer
          minimum: 20
          maximum: 2000
          default: 252
          description: Trading days of history for return curves and attribution series.
        mode:
          type: string
          enum: [frozen]
          default: frozen
          description: Currently only `frozen` (initial weights held through the window).
        benchmark:
          type: string
          nullable: true
          description: Optional benchmark ticker (reserved).

    CanonicalSnapshotResponse:
      type: object
      description: >
        Canonical JSON portfolio snapshot: L3 variance decomposition, frozen-weight daily
        attribution (gross and factor strips), cumulative return and drawdown, and risk summary.
        Response also includes `_metadata` and `_agent` (see other metered POST routes).
      required: [snapshot, time_behavior, attribution, risk_summary, metadata]
      properties:
        snapshot:
          type: object
          additionalProperties: true
        time_behavior:
          type: object
          additionalProperties: true
        attribution:
          type: object
          additionalProperties: true
        risk_summary:
          type: object
          additionalProperties: true
        metadata:
          type: object
          additionalProperties: true

    MetricsSnapshotResponse:
      type: object
      description: >
        Wire response for `GET /metrics/{ticker}`. Numeric fields live under `metrics`;
        `teo` is the observation date (V3 time-end).
      required:
        - symbol
        - ticker
        - teo
        - periodicity
        - metrics
        - display
        - meta
      properties:
        symbol:
          type: string
          description: Canonical symbol key in V3 registry.
        ticker:
          type: string
          example: NVDA
        teo:
          type: string
          format: date
          description: Latest observation date for the metrics row.
        periodicity:
          type: string
          example: daily
        metrics:
          $ref: "#/components/schemas/MetricsV3"
        display:
          type: object
          additionalProperties:
            type: string
          description: Optional display labels for metric keys (e.g. UI column titles).
        meta:
          type: object
          properties:
            sector_etf:
              type: string
              nullable: true
            asset_type:
              type: string
              nullable: true

    TickerReturnsDailyRow:
      type: object
      description: >
        One trading day in `GET /ticker-returns` `data` array. Stock rows populate the full
        V3 security_history field set below. **ETF rows are a strict subset — only `date`,
        `returns_gross`, and `price_close` are emitted** (the L1/L2/L3 hedge/ER properties
        are omitted entirely from ETF rows rather than returned as `null`, since ETFs are
        not factor-decomposed). Branch on the response's top-level `asset_type` before
        reading L* fields.
      properties:
        date:
          type: string
          format: date
        returns_gross:
          type: number
          format: float
          nullable: true
          description: Daily gross return of the stock. Null when rolling-window metrics are unavailable (trailing data).
        price_close:
          type: number
          format: float
          nullable: true
          description: End-of-day price when available from history.
        l3_mkt_hr:
          type: number
          format: float
          nullable: true
          description: >
            Rolling L3 market hedge ratio (SPY notional per $1 stock). Null in trailing rows
            where the rolling regression window has insufficient data. May be negative
            (orthogonalization); negative market HR at L2/L3 is common.
        l3_sec_hr:
          type: number
          format: float
          nullable: true
          description: >
            Rolling L3 sector ETF hedge ratio (dollar_ratio). Null when the rolling window has
            insufficient data. May be negative due to orthogonalization (factor neutralization);
            not a sign error in the data.
        l3_sub_hr:
          type: number
          format: float
          nullable: true
          description: >
            Rolling L3 subsector ETF hedge ratio (dollar_ratio). Null when the rolling window has
            insufficient data. May be negative (orthogonalization or long subsector ETF leg); not a
            sign error in the data.
        l3_mkt_er:
          type: number
          format: float
          nullable: true
          description: >
            Market variance share at L3 (explained risk, 0–1). Null in trailing rows where the
            rolling window has insufficient data.
        l3_sec_er:
          type: number
          format: float
          nullable: true
          description: >
            Sector variance share at L3 (explained risk, 0–1). Null when the rolling window has
            insufficient data.
        l3_sub_er:
          type: number
          format: float
          nullable: true
          description: >
            Subsector variance share at L3 (explained risk, 0–1). Null when the rolling window has
            insufficient data.
        l3_res_er:
          type: number
          format: float
          nullable: true
          description: >
            Idiosyncratic (residual) variance share at L3 (0–1); SDK semantic name `l3_residual_er`.
            Null when the rolling window has insufficient data.

    GrossReturnDailyRow:
      type: object
      description: >
        One trading day in Parquet/CSV for `GET /returns` and `GET /etf-returns`: long table
        with the same fields as zipping JSON parallel arrays `dates` and `returns_gross` by index.
      properties:
        date:
          type: string
          format: date
        returns_gross:
          type: number
          format: float
          nullable: true
