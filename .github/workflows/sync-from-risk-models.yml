# Specialized hand-off: RiskModels_API is the source. Build JSON, deliver to Risk_Models.
#
# Flow:
# 1. RiskModels_API (source): Edit OPENAPI_SPEC.yaml (full version: rankings, ETFs, etc.)
# 2. Build: Convert YAML -> openapi.json
# 3. Delivery: Push openapi.json to Risk_Models/mcp-server/data/
# 4. Risk_Models (consumer): App and Supabase serve the API using the updated JSON
#
# Required secret: REPO_ACCESS_TOKEN
#   - Read: Risk_Models (API_TERMS.md)
#   - Write: Risk_Models (push openapi.json to mcp-server/data/)
#
name: Sync from Risk Models

on:
  push:
    branches: [main]
    paths:
      - "OPENAPI_SPEC.yaml"
  workflow_dispatch:
  repository_dispatch:
    types: [sync_api_assets]
  schedule:
    - cron: "0 0 * * 0"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout RiskModels_API
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout Risk_Models
        uses: actions/checkout@v4
        with:
          repository: Cerebellum-Archive/Risk_Models
          path: risk-models
          token: ${{ secrets.REPO_ACCESS_TOKEN }}

      - name: Copy API_TERMS.md
        run: |
          cp risk-models/riskmodels_com/docs/api/API_TERMS.md API_TERMS.md

      - name: Build openapi.json from OPENAPI_SPEC.yaml
        run: |
          pip install pyyaml
          python3 -c "
          import yaml, json
          with open('OPENAPI_SPEC.yaml') as f:
              spec = yaml.safe_load(f)
          with open('OPENAPI_SPEC.json', 'w') as f:
              json.dump(spec, f, indent=2)
          with open('mcp-server/data/openapi.json', 'w') as f:
              json.dump(spec, f, indent=2)
          "

      - name: Validate OpenAPI spec
        run: |
          npx @apidevtools/swagger-cli validate OPENAPI_SPEC.yaml

      - name: Commit and push (RiskModels_API)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: sync API_TERMS, regenerate openapi.json from YAML [skip ci]"
          file_pattern: |
            API_TERMS.md
            OPENAPI_SPEC.json
            mcp-server/data/openapi.json

      - name: Deliver openapi.json to Risk_Models
        run: |
          cp mcp-server/data/openapi.json risk-models/riskmodels_com/mcp-server/data/openapi.json
          cd risk-models
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add riskmodels_com/mcp-server/data/openapi.json
          if git diff --staged --quiet; then
            echo "No changes to openapi.json, skip push"
          else
            git commit -m "chore: sync openapi.json from RiskModels_API [skip ci]"
            git push origin HEAD
          fi
